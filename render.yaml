# render.yaml — Discovery Bank AI Assistant
# Auto-configures Render.com on repo connect

services:
  - type: web
    name: discovery-bank-ai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --workers 1 --timeout 120 --bind 0.0.0.0:$PORT --log-level info
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: MAX_TOKENS
        value: 800
      - key: GROQ_API_KEY
        sync: false   # Set manually in Render dashboard → never commit your key
